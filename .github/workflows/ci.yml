name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g serve
      - run: |
          serve . -l 3000 &
          sleep 3
      - run: curl -f http://localhost:3000
